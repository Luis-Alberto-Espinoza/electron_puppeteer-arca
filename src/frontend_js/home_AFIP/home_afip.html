<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home AFIP</title>
</head>
<body>
    <div class="contenedor-home-afip">
        <h2 class="titulo-home-afip">Servicios AFIP</h2>
        <p class="descripcion-home-afip">Seleccione el servicio que desea utilizar</p>

        <div class="botones-home-afip">
            <button id="btnGenerarVEP" class="btn-servicio-afip">
                <span class="icono-btn">💳</span>
                <span class="texto-btn">Generar VEP</span>
                <span class="descripcion-btn">Volante Electrónico de Pago</span>
            </button>

            <button id="btnGenerarFactura" class="btn-servicio-afip">
                <span class="icono-btn">📄</span>
                <span class="texto-btn">Generar Factura</span>
                <span class="descripcion-btn">Comprobantes electrónicos</span>
            </button>

            <button id="btnPlanesDePago" class="btn-servicio-afip">
                <span class="icono-btn">📋</span>
                <span class="texto-btn">Planes de Pago</span>
                <span class="descripcion-btn">Datos de Planes de Pago</span>
            </button>
        </div>
    </div>
</body>
</html>
