<div class="planes-container">
    <div class="planes-header">
        <h2>Datos de Planes de Pago</h2>
    </div>

    <!-- Gestión de listas guardadas (ARRIBA) -->
    <div class="planes-seccion planes-gestion-listas">
        <div class="planes-seccion-titulo">Lista de representantes</div>
        <div class="listas-fila">
            <select id="selectListaPlanes" class="planes-select-lista">
                <option value="">-- Sin lista guardada --</option>
            </select>
            <button id="btnNuevaListaPlanes" class="btn planes-btn-lista">+ Nueva</button>
            <button id="btnRenombrarListaPlanes" class="btn planes-btn-lista">Renombrar</button>
            <button id="btnEliminarListaPlanes" class="btn planes-btn-lista planes-btn-lista-eliminar">Eliminar</button>
        </div>
        <div id="panelNombreListaPlanes" style="display:none">
            <div class="nombre-lista-fila">
                <input id="inputNombreListaPlanes" type="text" class="planes-input planes-input-nombre" placeholder="Nombre de la lista..." />
                <button id="btnConfirmarNombrePlanes" class="btn planes-btn-lista planes-btn-confirmar-nombre">Confirmar</button>
                <button id="btnCancelarNombrePlanes" class="btn planes-btn-lista">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Textarea de búsqueda por nombre -->
    <div class="planes-seccion">
        <div class="planes-seccion-titulo">Buscar representantes por nombre <span class="planes-hint">(uno por línea)</span></div>
        <textarea
            id="textareaNombresPlanes"
            rows="6"
            placeholder="Ej:&#10;Luis S.A.&#10;Fideicomiso 5&#10;Empresa XYZ"></textarea>
        <div class="textarea-acciones">
            <button id="btnBuscarSeleccionarPlanes" class="btn planes-btn-buscar-seleccionar">Buscar y seleccionar</button>
            <button id="btnGuardarListaPlanes" class="btn planes-btn-guardar-lista">Guardar lista</button>
        </div>
        <div id="matchResultadoPlanes" style="display:none"></div>
    </div>

    <!-- Tabla de representantes (SelectorUsuarios) -->
    <div id="selector-representantes-planes"></div>

    <!-- Limpiar seleccionados -->
    <div class="planes-controles">
        <button id="btnLimpiarSeleccionPlanes" class="btn planes-btn-limpiar-seleccion">✕ Limpiar seleccionados</button>
    </div>

    <!-- Panel de CUITs por representante (colapsables) -->
    <div id="panelCuitsRepresentantes" class="planes-seccion" style="display:none">
        <div class="planes-seccion-titulo">CUITs a procesar por representante</div>
        <div id="contenedorBloquesRepresentantes">
            <!-- Bloques colapsables dinámicos -->
        </div>
    </div>

    <!-- Botón procesar -->
    <div class="planes-procesar">
        <button id="btnObtenerDatos" class="btn planes-btn-obtener" disabled>
            ▶ Obtener Datos Plan de Pagos
        </button>
    </div>

    <!-- Panel de resultados -->
    <div id="resultadosPlanesDePago" class="planes-seccion" style="display:none">
        <div class="planes-seccion-titulo">Resultados</div>
        <div id="resultadosContenido"></div>
    </div>
</div>
