<div class="container">
        <div class="header">
            <h1>🚀 CRUD Usuarios</h1>
            <p>Gestión de usuarios con Electron + JSON</p>
        </div>

        <div class="bulk-upload-section">
            <h2>📂 Carga Masiva de Usuarios desde Excel</h2>
            <div class="form-group">
                <label for="excelFile">Selecciona un archivo Excel (.xlsx, .xls, .csv):</label>
                <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
            </div>
            <button class="btn btn-success" id="btnCargarExcel">
                <span id="uploadLoading" class="loading hidden">
                    <span class="spinner"></span>
                    <span class="loader-text">Procesando...</span>
                </span>
                <span id="btnCargarExcelText">Procesar Archivo</span>
            </button>
            <div id="uploadStatus" class="status-message hidden"></div>
        </div>

        <div class="content">
            <!-- Formulario de edición (oculto inicialmente) -->
            <div id="editForm" class="edit-form hidden">
                <h3>✏️ Editando Usuario</h3>
                <div class="form-columns">
                    <div class="form-column">
                        <div class="form-group">
                            <label for="editNombre">Nombre:</label>
                            <input type="text" id="editNombre" placeholder="Ingresa el nombre">
                        </div>
                        <div class="form-group">
                            <label for="editCuit">CUIT:</label>
                            <input type="text" id="editCuit" maxlength="11" pattern="d{11}" placeholder="Ingresa el CUIT">
                            <span id="editCuitError" class="validation-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="editTipoContribuyente">Tipo Contribuyente:</label>
                            <select id="editTipoContribuyente">
                                <option value="">Seleccione...</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-column">
                        <div class="form-group">
                            <label for="editApellido">Apellido:</label>
                            <input type="text" id="editApellido" placeholder="Ingresa el apellido">
                        </div>
                        <div class="form-group">
                            <label for="editCuil">CUIL:</label>
                            <input type="text" id="editCuil" maxlength="11" pattern="d{11}" placeholder="Ingresa el CUIL">
                            <span id="editCuilError" class="validation-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="editClaveAFIP">Clave de AFIP - ARCA:</label>
                            <input type="text" id="editClaveAFIP" placeholder="Ingresa la clave de AFIP">
                        </div>
                        <div class="form-group">
                            <label for="editClaveATM">Clave de ATM:</label>
                            <input type="text" id="editClaveATM" placeholder="Ingresa la clave de ATM">
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="updateUser()">
                    <span id="updateLoading" class="loading hidden"></span>
                    Actualizar Usuario
                </button>
                <button class="btn btn-secondary" onclick="cancelEdit()">Cancelar</button>
            </div>

            <!-- Formulario para crear usuario -->
            <div class="form-section">
                <h2>➕ Crear Nuevo Usuario</h2>
                <div class="form-columns">
                    <div class="form-column">
                        <div class="form-group">
                            <label for="nombre">Nombre:</label>
                            <input type="text" id="nombre" placeholder="Ingresa el nombre del usuario">
                        </div>
                        <div class="form-group">
                            <label for="cuit">CUIT:</label>
                            <input type="text" id="cuit" maxlength="11" pattern="d{11}" placeholder="Ingresa el CUIT">
                            <span id="cuitError" class="validation-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="tipoContribuyente">Tipo Contribuyente:</label>
                            <select id="tipoContribuyente">
                                <option value="">Seleccione...</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-column">
                        <div class="form-group">
                            <label for="apellido">Apellido:</label>
                            <input type="text" id="apellido" placeholder="Ingresa el apellido">
                        </div>
                        <div class="form-group">
                            <label for="cuil">CUIL:</label>
                            <input type="text" id="cuil" maxlength="11" pattern="d{11}" placeholder="Ingresa el CUIL">
                            <span id="cuilError" class="validation-error"></span>
                        </div>
                        <div class="form-group">
                            <label for="claveAFIP">Clave de AFIP - ARCA:</label>
                            <input type="text" id="claveAFIP" placeholder="Ingresa la clave de AFIP">
                        </div>
                        <div class="form-group">
                            <label for="claveATM">Clave de ATM:</label>
                            <input type="text" id="claveATM" placeholder="Ingresa la clave de ATM">
                        </div>
                    </div>
                </div>
                <div id="verificarUsuario" class="verificarUsuario">
                    <button class="btn btn-primary" id="btnVerificarCredenciales">
                        Verificar Credenciales
                    </button>
                    <span id="verificarLoading" class="loading hidden"></span>
                    <!-- Alerta para mensajes -->
                    <div id="alert" class="alert hidden">
                        <span id="alertMessage"></span>
                    </div>
                </div>
                <!-- Contenedor para la lista de puntos de venta -->
                <div id="elegirEmpresa" class="puntos-venta-list" style="margin: 10px 0;"></div>
                <button class="btn btn-primary" id="btnCrearUsuario" style="display:none;">
                    <span id="createLoading" class="loading hidden"></span>
                    Crear Usuario
                </button>
            </div>

            <!-- Lista de usuarios -->
            <div class="users-section">
                <h2>👥 Usuarios Registrados</h2>
                <button class="btn btn-secondary" id="btnRecargarLista" style="margin-bottom: 20px;">
                    <span id="loadLoading" class="loading hidden"></span>
                    🔄 Recargar Lista
                </button>
                <div id="usersList" class="users-list">
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>No hay usuarios registrados</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
