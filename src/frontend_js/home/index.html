<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.jsdelivr.net; 
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 img-src 'self' data: https:;
                 connect-src 'self' https://cdn.jsdelivr.net;">
    <title>ARCA - AFIP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>

<body>
    <div class="general">
        <h1>Sistema AFIP - ARCA</h1>

        <!-- MENÚ PRINCIPAL -->
        <div class="menu-principal">
            <button id="btnEntrarAfip" class="btn-principal">Entrar a AFIP</button>
            <button id="btnEntrarATM" class="btn-principal">Entrar a ATM</button>
            <button id="btnUsuarios" class="btn-principal">Gestión de Usuarios</button>
            <button id="btnExtraerTablasPDF" class="btn-principal">Extraer Tablas PDF</button>
        </div>

        <!-- HOME AFIP (Menú de servicios AFIP) -->
        <div id="homeAfipDiv" class="contenido-oculto">
            <!-- Aquí se cargará el módulo home_AFIP -->
        </div>

        <!-- GENERAR VEP -->
        <div id="generarVEPDiv" class="contenido-oculto">
            <!-- Aquí se cargará el módulo generar_VEP -->
        </div>

        <!-- SELECTOR DE USUARIO -->
        <div id="selectorUsuarioDiv" class="contenido-oculto">
            <div class="selector-usuario">
                <h2>Seleccione el Usuario con el que trabajará</h2>
                <select id="selectUsuariosSelector">
                    <option value="">Cargando usuarios...</option>
                </select>
                <p style="color: #666; font-size: 14px; margin-top: 10px;">
                    Una vez seleccionado el usuario, podrá acceder a los módulos de Facturas y MercadoPago
                </p>
            </div>
        </div>
        

        <!-- MÓDULOS AFIP (Se muestran después de seleccionar usuario) -->
        <div id="modulosAfipDiv" class="contenido-oculto">
            <div id="infoUsuarioSeleccionado"></div>
            <div class="seccion" id="facturasSeccion">
                <button id="facturasBtn" class="btn-principal">Realizar Facturas</button>
                <div id="facturasDiv" class="contenido-oculto"></div>
            </div>
            <div class="seccion" id="lectorMpSeccion">
                <button id="btnLectorMP" class="btn-principal">Lector MercadoPago</button>
                <div id="leerMercadoPagoDiv" class="contenido-oculto"></div>
            </div>
            <div class="seccion" id="libroIvaSeccion">
                <button id="btnLibroIVA" class="btn-principal">Libro IVA</button>
                <div id="libroIvaDiv" class="contenido-oculto"></div>
            </div>
        </div>

        <div id="atmsDiv" class="contenido-oculto">
        </div>

        <div id="usuariosDiv" class="contenido-oculto">
        </div>

        <!-- SOLO VISUALIZAR EL MÓDULO DE EXTRAER TABLAS PDF -->
        <div id="extraerTablasPDFDiv">
            <!-- Aquí se cargará el módulo visual de extraer tablas de PDF -->
        </div>
    </div>

    <script type="module" src="../controlador.js"></script>
    <script src="script.js"></script>
    <!-- <script src="../usuario/script_create_Usuario.js" type="module"></script> -->
</body>

</html>
